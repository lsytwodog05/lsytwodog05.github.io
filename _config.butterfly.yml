# Butterfly 主题配置（覆盖主题默认值）
# 文档: https://butterfly.js.org/

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

# 右上角导航：首页 / 简历 / 归档 / 标签 / 分类
menu:
  首页: / || fas fa-home
  简历: /resume/ || fas fa-id-card
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open

social:
  fab fa-github: https://github.com/lsytwodog05 || GitHub || '#24292e'

favicon: /img/favicon.png

avatar:
  img: /img/avatar.png
  effect: false

disable_top_img: false

index_img: /img/index-banner.jpg

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - /img/default-cover.jpg

post_meta:
  page:
    date_type: both
    date_format: YYYY-MM-DD
    categories: true
    tags: true
  post:
    date_type: both
    date_format: YYYY-MM-DD
    categories: true
    tags: true

footer:
  owner:
    enable: true
    since: 2026
  custom_text: Framework <a target="_blank" rel="noopener" href="https://hexo.io/">Hexo</a> | Theme <a target="_blank" rel="noopener" href="https://github.com/jerryc127/hexo-theme-butterfly">Butterfly</a>

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display_archive: true
  archive_asc: false
  archive_count: 5
  display_categories: true
  category_asc: false
  category_count: 6
  card_author:
    enable: true
    description: 中科大研究生 · 寻找搜广推实习
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/lsytwodog05
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order: -1
  card_announcement:
    enable: true
    content: |
      👋 你好，欢迎来访！
      <br>这里记录我的简历、博客与学习笔记。
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime_date: 2026/01/01 00:00:00

search:
  use: local_search
  placeholder: 搜索文章...
  local_search:
    preload: true
    top_n_per_article: 1
    unescape: false

translate:
  enable: false

rightside_config:
  enable: true
  hide: false
  show_percent: true

subtitle:
  enable: true
  effect: true
  loop: true
  source: false
  sub:
    - 记录成长
    - 沉淀思考
    - 持续学习

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 不蒜子统计服务数据经常异常虚高，关闭访客/浏览量，仅保留本地真实统计
busuanzi:
  site_uv: false
  site_pv: false
  page_pv: false

code_blocks:
  theme: light
  macStyle: true
  copy: true
  language: true
  shrink: false

inject:
  head:
  bottom:
    - <link rel="stylesheet" href="/css/resume.css">
    - <script>document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('#aside-content .author-info-name').forEach(function(el){el.textContent='李思怡'})})</script>
