# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: 李思怡
subtitle: '记录成长，沉淀思考'
description: '个人网站：简历、博客与学习笔记'
keywords: 博客, 学习笔记, 简历
author: 李思怡
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://lsytwodog05.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Home page
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: 博客
category_map:
tag_map:

meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

per_page: 10
pagination_dir: page

include:
exclude:
ignore:

theme: butterfly

# Local search (hexo-generator-search)
search:
  path: search.xml
  field: post
  content: true
  format: html

# Deployment (local manual deploy, optional)
deploy:
  type: ''
